{% extends "base.html" %}

{% block title %}Upload Campaign{% endblock %}

{% block content %}
<h1 class="text-3xl font-bold mb-6">Upload Campaign</h1>

<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow">
    <form action="{{ url_for('upload.upload_process') }}" method="POST" enctype="multipart/form-data">
        <div class="mb-4">
            <label class="block text-sm font-bold mb-2">Campaign Name</label>
            <input type="text" name="campaign_name" placeholder="e.g., Kisii Restaurants Jan 2025" 
                   class="w-full px-4 py-2 border rounded-lg" required>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-bold mb-2">Location</label>
            <input type="text" name="location" placeholder="e.g., Kisii, Kenya" 
                   class="w-full px-4 py-2 border rounded-lg" required>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-bold mb-2">CSV File</label>
            <input type="file" name="file" accept=".csv" 
                   class="w-full px-4 py-2 border rounded-lg" required>
            <p class="text-sm text-gray-600 mt-2">Sample: uploads/sample_kisii_businesses.csv</p>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700">
            Upload and Preview
        </button>
    </form>
</div>
{% endblock %}
