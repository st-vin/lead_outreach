<header class="sticky top-0 z-30 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/10">
    <div class="flex items-center justify-between px-4 sm:px-6 lg:px-10 py-4">
        <div class="flex items-center gap-3">
            <button
                type="button"
                class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-surface-container-low text-on-surface-variant
                       hover:bg-surface-container-high transition-colors md:hidden"
                onclick="toggleSidebar()"
                aria-label="Toggle navigation"
            >
                <span class="material-symbols-outlined text-lg">menu</span>
            </button>

            <div class="flex items-center gap-3 md:hidden">
                <span class="material-symbols-outlined text-primary text-2xl">architecture</span>
            <div class="flex flex-col">
                <span class="font-headline font-semibold text-sm tracking-tight text-on-surface">
                    Precision Architect
                </span>
                <span class="text-[10px] font-label uppercase tracking-[0.18em] text-outline">
                    Outreach Engine
                </span>
                </div>
            </div>
        </div>

        <div class="hidden md:flex flex-col gap-1">
            <span class="text-[10px] font-label uppercase tracking-[0.18em] text-outline font-bold">
                Lead Outreach
            </span>
            <span class="font-headline font-bold text-lg tracking-tight text-on-surface">
                {% block page_heading %}{% endblock %}
            </span>
        </div>

        <div class="flex items-center gap-3">
            <button class="hidden sm:inline-flex items-center gap-2 px-3 py-2 rounded-xl border border-outline-variant/40
                           bg-surface-container-low text-xs font-label font-semibold text-on-surface-variant
                           hover:bg-surface-container-high transition-colors">
                <span class="material-symbols-outlined text-sm">search</span>
                <span>Search</span>
            </button>

            <button class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-surface-container-low
                           text-on-surface-variant hover:bg-surface-container-high transition-colors">
                <span class="material-symbols-outlined text-lg">notifications</span>
            </button>
        </div>
    </div>
</header>
