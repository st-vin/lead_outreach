{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold mb-6">Settings</h1>

    <form method="POST" class="bg-white p-6 rounded-lg shadow space-y-6">
        <div>
            <label class="block text-sm font-bold mb-2">Your Name</label>
            <input type="text" name="name" value="{{ user.name }}" 
                   class="w-full px-4 py-2 border rounded-lg" required>
        </div>

        <div>
            <label class="block text-sm font-bold mb-2">Service Type</label>
            <select name="skill" class="w-full px-4 py-2 border rounded-lg">
                <option value="Web Development" {% if user.settings.get('skill') == 'Web Development' %}selected{% endif %}>Web Development</option>
                <option value="Graphic Design" {% if user.settings.get('skill') == 'Graphic Design' %}selected{% endif %}>Graphic Design</option>
                <option value="SEO Marketing" {% if user.settings.get('skill') == 'SEO Marketing' %}selected{% endif %}>SEO Marketing</option>
                <option value="Social Media Management" {% if user.settings.get('skill') == 'Social Media Management' %}selected{% endif %}>Social Media Management</option>
                <option value="Content Writing" {% if user.settings.get('skill') == 'Content Writing' %}selected{% endif %}>Content Writing</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-bold mb-2">Pitch Tone</label>
            <select name="pitch_tone" class="w-full px-4 py-2 border rounded-lg">
                <option value="professional" {% if user.settings.get('pitch_tone') == 'professional' %}selected{% endif %}>Professional</option>
                <option value="casual" {% if user.settings.get('pitch_tone') == 'casual' %}selected{% endif %}>Casual</option>
                <option value="friendly" {% if user.settings.get('pitch_tone') == 'friendly' %}selected{% endif %}>Friendly</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-bold mb-2">Country Code</label>
            <input type="text" name="country_code" value="{{ user.settings.get('country_code', '+254') }}" 
                   class="w-full px-4 py-2 border rounded-lg" placeholder="+254">
        </div>

        <div>
            <label class="block text-sm font-bold mb-2">Cerebras API Key</label>
            {% if masked_key %}
            <div class="mb-2 p-3 bg-green-50 border border-green-200 rounded-lg">
                <div class="flex items-center justify-between">
                    <span class="text-sm text-green-800">Current key: <code>{{ masked_key }}</code></span>
                    <span class="text-xs text-green-600">✓ {{ api_key_status }}</span>
                </div>
            </div>
            {% endif %}
            <input type="password" name="cerebras_api_key" placeholder="sk-xxxxxxxxxxxxxxxx" 
                   class="w-full px-4 py-2 border rounded-lg">
            <p class="text-sm text-gray-600 mt-1">Leave blank to keep current key. Get free key at <a href="https://cerebras.ai" target="_blank" class="text-blue-600">cerebras.ai</a></p>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700">
            Save Settings
        </button>
    </form>
</div>
{% endblock %}
